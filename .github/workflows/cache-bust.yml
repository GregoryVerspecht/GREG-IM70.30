name: Cache-bust assets

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cache-bust:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Rewrite asset version query strings
        run: |
          SHA="${GITHUB_SHA::7}"
          sed -i -E "s#(href|src)=\"(assets/(style\.css|app\.js|config\.js|todo\.js))(\?v=[a-zA-Z0-9]*)?\"#\1=\"\2?v=${SHA}\"#g" *.html
          grep -n 'assets/.*\.\(css\|js\)?v=' *.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add *.html
            git commit -m "chore: cache-bust assets [skip ci]"
            git push
          else
            echo "No asset references changed, nothing to commit."
          fi
